name: Build & Release

# Запускается при создании тега версии (например: v0.1.0)
on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────
  # Windows → Nestify-Setup.exe (NSIS installer + Playwright/Chromium)
  # ─────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Download Playwright Chromium (bundled в installer)
        run: |
          $env:PLAYWRIGHT_BROWSERS_PATH = ".\playwright-browsers"
          playwright install chromium
        shell: pwsh

      - name: Build directory с PyInstaller
        run: pyinstaller nestify.spec --clean

      - name: Install NSIS
        run: choco install nsis -y --no-progress

      - name: Build Nestify-Setup.exe (NSIS)
        run: makensis installer\nestify.nsi
        shell: cmd

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: Nestify-Windows
          path: dist\Nestify-Setup.exe

  # ─────────────────────────────────────────
  # macOS → Nestify.dmg (drag-to-Applications + Playwright/Chromium)
  # ─────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller Pillow

      - name: Download Playwright Chromium (bundled в .app)
        run: |
          PLAYWRIGHT_BROWSERS_PATH=./playwright-browsers playwright install chromium

      - name: Build .app с PyInstaller
        run: pyinstaller nestify.spec --clean

      - name: Sign .app (ad-hoc — без платного сертификата Apple)
        run: codesign --force --deep --sign - dist/Nestify.app

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create Nestify.dmg
        run: |
          create-dmg \
            --volname "Nestify" \
            --volicon "assets/logo.png" \
            --window-pos 200 120 \
            --window-size 600 380 \
            --icon-size 120 \
            --icon "Nestify.app" 165 185 \
            --hide-extension "Nestify.app" \
            --app-drop-link 435 185 \
            --no-internet-enable \
            "dist/Nestify.dmg" \
            "dist/Nestify.app"

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: Nestify-macOS
          path: dist/Nestify.dmg

  # ─────────────────────────────────────────
  # GitHub Release с обоими файлами
  # ─────────────────────────────────────────
  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows build
        uses: actions/download-artifact@v4
        with:
          name: Nestify-Windows
          path: artifacts/

      - name: Download macOS build
        uses: actions/download-artifact@v4
        with:
          name: Nestify-macOS
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Nestify ${{ github.ref_name }}
          body: |
            ## Nestify ${{ github.ref_name }}

            ### Скачать
            | Платформа | Файл | Что внутри |
            |-----------|------|-----------|
            | 🪟 Windows | `Nestify-Setup.exe` | Installer — установит в Program Files, ярлык на рабочем столе |
            | 🍎 macOS   | `Nestify.dmg` | Перетащи Nestify.app в Applications |

            > **Chromium уже включён** — дополнительно ничего устанавливать не нужно.

            ### Первый запуск
            1. **Windows**: запусти `Nestify-Setup.exe`, следуй мастеру установки
            2. **macOS**: открой `Nestify.dmg`, перетащи Nestify в Applications, запусти
            3. Браузер откроется автоматически на `http://localhost:8000`
            4. Введи Gemini API токен → войди в Krisha.kz → готово!

            > **macOS**: если появится «не удаётся открыть» — это Gatekeeper.
            > Запусти в Терминале: `xattr -dr com.apple.quarantine /Applications/Nestify.app`
            > Затем дважды кликни на иконку — откроется нормально.
          files: |
            artifacts/Nestify-Setup.exe
            artifacts/Nestify.dmg
          draft: false
          prerelease: false

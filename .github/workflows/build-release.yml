name: Build & Release

# Запускается при создании тега версии (например: v0.1.0)
on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────
  # Windows → Nestify.exe
  # ─────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Convert SVG icon to ICO
        run: |
          pip install svglib reportlab Pillow
          python -c "
          import io
          from svglib.svglib import svg2rlg
          from reportlab.graphics import renderPM
          from PIL import Image
          drawing = svg2rlg('assets/logo.svg')
          scale = 256 / max(drawing.width, drawing.height)
          drawing.width *= scale
          drawing.height *= scale
          drawing.transform = (scale, 0, 0, scale, 0, 0)
          png_data = renderPM.drawToString(drawing, fmt='PNG')
          img = Image.open(io.BytesIO(png_data)).convert('RGBA')
          img.save('assets/logo.ico', format='ICO', sizes=[(256,256),(128,128),(64,64),(32,32),(16,16)])
          "

      - name: Build .exe with PyInstaller
        run: pyinstaller nestify.spec --clean

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: Nestify-Windows
          path: dist/Nestify.exe

  # ─────────────────────────────────────────
  # macOS → Nestify.app → Nestify-macOS.zip
  # ─────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Convert SVG icon to PNG
        run: |
          brew install librsvg
          rsvg-convert -w 512 -h 512 assets/logo.svg -o assets/logo.png

      - name: Build .app with PyInstaller
        run: pyinstaller nestify.spec --clean

      - name: Zip .app bundle
        run: |
          cd dist
          zip -r Nestify-macOS.zip Nestify.app

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: Nestify-macOS
          path: dist/Nestify-macOS.zip

  # ─────────────────────────────────────────
  # Создаём GitHub Release и прикладываем файлы
  # ─────────────────────────────────────────
  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows build
        uses: actions/download-artifact@v4
        with:
          name: Nestify-Windows
          path: artifacts/

      - name: Download macOS build
        uses: actions/download-artifact@v4
        with:
          name: Nestify-macOS
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Nestify ${{ github.ref_name }}
          body: |
            ## Nestify ${{ github.ref_name }}

            ### Скачать
            | Платформа | Файл |
            |-----------|------|
            | 🪟 Windows | `Nestify.exe` |
            | 🍎 macOS   | `Nestify-macOS.zip` → распакуй и перенеси в Applications |

            ### Первый запуск
            1. Скачай файл для своей платформы
            2. **macOS**: распакуй архив, перенеси `Nestify.app` в папку Applications
            3. **Windows**: запусти `Nestify.exe`
            4. Браузер откроется автоматически на `http://localhost:8000`
            5. Введи Gemini API токен → войди в Krisha.kz → готово!

            > **macOS**: если появится предупреждение безопасности —
            > Системные настройки → Конфиденциальность → «Всё равно открыть»
          files: |
            artifacts/Nestify.exe
            artifacts/Nestify-macOS.zip
          draft: false
          prerelease: false
